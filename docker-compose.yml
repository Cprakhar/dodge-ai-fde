services:
  neo4j:
    image: neo4j
    container_name: o2c-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: ./backend
    container_name: o2c-backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-70b-versatile}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      DATASET_ROOT: /workspace/sap-o2c-data
    volumes:
      - ./:/workspace
    depends_on:
      - neo4j

  frontend:
    build:
      context: ./frontend
    container_name: o2c-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  neo4j_data:
